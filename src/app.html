<!doctype html>

<html data-theme="dark" class="overflow-y-scroll scroll-smooth">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
		<link rel="icon" type="image/png" href="/favicon.png" />
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
		<script>
			(function () {
				const stored = localStorage.getItem("theme");
				const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
				const theme = stored ?? (prefersDark ? "dark" : "light");
				document.firstElementChild?.setAttribute("data-theme", theme);
			})();
		</script>
	</head>
	<body>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
